<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>백설공주를 사랑한 난쟁이 · 음악 큐</title><style>:root{--b:#090b10;--p:#12151c;--p2:#1b1f28;--l:#2a303b;--t:#f4f6f9;--m:#9ca5b4;--a:#f5a20a}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--t);font-family:system-ui,"Noto Sans KR",sans-serif}.app{display:grid;grid-template-columns:355px 1fr;min-height:100vh}aside{height:100vh;position:sticky;top:0;display:flex;flex-direction:column;border-right:1px solid var(--l);background:#080a0e}header{padding:22px;border-bottom:1px solid var(--l)}.ey{color:var(--a);font-size:11px;font-weight:900;letter-spacing:.15em}h1{font-size:20px;margin:8px 0}.sub{font-size:12px;color:var(--m);line-height:1.55}.tools{padding:12px;border-bottom:1px solid var(--l);display:grid;gap:8px}input,select,textarea{width:100%;border:1px solid var(--l);border-radius:10px;background:#0d1016;color:var(--t);padding:10px;font:inherit}.filters{display:flex;gap:6px;flex-wrap:wrap}.filter,.mode,.btn{border:1px solid var(--l);border-radius:10px;background:#1a1f27;color:var(--t);padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer}.filter.on,.mode.on,.btn.primary{background:var(--a);border-color:var(--a);color:#181006}#list{overflow:auto;padding:9px}.act{padding:14px 9px 6px;color:var(--m);font-size:11px;font-weight:900}.cue{width:100%;display:grid;grid-template-columns:42px 1fr auto;gap:9px;align-items:center;margin:4px 0;padding:9px;border:1px solid transparent;border-radius:13px;background:transparent;color:var(--t);text-align:left;cursor:pointer}.cue:hover,.cue.sel{background:var(--p2);border-color:#4b3a23}.num{width:40px;height:40px;border-radius:10px;background:#232833;color:var(--a);display:grid;place-items:center;font-size:12px;font-weight:900}.cue b{font-size:13px;display:block}.cue small,.time{font-size:11px;color:var(--m)}.time{background:#252a34;border-radius:8px;padding:5px 7px}main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:15px;margin-bottom:16px}h2{margin:4px 0;font-size:26px}.stats{display:flex;gap:8px}.stat{padding:9px 12px;border:1px solid var(--l);border-radius:12px;background:var(--p)}.stat b{display:block;font-size:18px}.stat span{font-size:10px;color:var(--m)}.grid{display:grid;grid-template-columns:minmax(500px,1.55fr) minmax(300px,.8fr);gap:17px}.card{background:var(--p);border:1px solid var(--l);border-radius:18px;overflow:hidden}.modes{display:flex;gap:7px;padding:11px;border-bottom:1px solid var(--l)}.player{aspect-ratio:16/9;background:#000;position:relative}.player video,.player iframe{width:100%;height:100%;border:0;display:block;background:#000}.layer{position:absolute;inset:0}.hidden{display:none!important}.status{position:absolute;left:10px;bottom:10px;background:#080b10dd;border:1px solid var(--l);border-radius:8px;padding:6px 9px;font-size:11px;color:var(--m)}.filebox{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:25px;background:#0a0d12}.filebox p{color:var(--m);font-size:12px}.bar{display:flex;justify-content:space-between;gap:8px;padding:12px;border-top:1px solid var(--l);align-items:center}.detail{padding:20px}.head{display:flex;justify-content:space-between;gap:10px}.cid{color:var(--a);font-size:12px;font-weight:900}.detail h3{font-size:22px;margin:6px 0}.badge{font-size:10px;padding:6px 8px;border-radius:999px;background:#272d37;height:max-content}label{display:grid;gap:6px;margin-top:13px;color:var(--m);font-size:11px;font-weight:800}textarea{min-height:125px;resize:vertical}.check{display:flex;align-items:center;gap:7px}.check input{width:auto}.note{margin-top:12px;padding:11px;border:1px solid #5b431c;border-radius:11px;background:#f5a20a10;color:#efd29d;font-size:12px;line-height:1.5}@media(max-width:900px){.app{grid-template-columns:290px 1fr}.grid{grid-template-columns:1fr}}@media(max-width:680px){.app{display:block}aside{position:relative;height:auto;max-height:520px}main{padding:14px}.top{display:block}.stats{margin-top:10px;flex-wrap:wrap}.grid{display:block}.card{margin-bottom:13px}}</style></head><body><div class="app"><aside><header><div class="ey">DRIVE VIDEO / CUE COORDINATION</div><h1>백설공주를 사랑한 난쟁이</h1><div class="sub">업로드한 JSON의 담당 구분과 회의 메모가 반영된 버전입니다.</div></header><div class="tools"><input id="q" placeholder="곡명·번호 검색"><div class="filters" id="filters"></div></div><div id="list"></div></aside><main><div class="top"><div><div class="ey">IN-APP VIDEO REFERENCE BOOK</div><h2>영상 마킹 & 그라티아 협의</h2><div class="sub">왼쪽 큐를 누르면 해당 시간으로 이동합니다.</div></div><div class="stats"><div class="stat"><b id="total">-</b><span>전체 마커</span></div><div class="stat"><b id="gc">-</b><span>그라티아</span></div><div class="stat"><b>73:50</b><span>영상 길이</span></div></div></div><section class="grid"><div class="card"><div class="modes"><button class="mode on" data-mode="direct">큐 자동 재생</button><button class="mode" data-mode="drive">Drive 호환 재생</button><button class="mode" data-mode="local">내 MP4 선택</button></div><div class="player"><div id="direct" class="layer"><video id="dv" controls playsinline preload="metadata" src="https://drive.usercontent.google.com/download?id=1U1z2XL5Im-Pq-B6ctwDZCRpp6KogbZCF&export=download&confirm=t"></video><div class="status" id="status">Drive 영상 연결 중...</div></div><iframe id="drive" class="layer hidden" src="https://drive.google.com/file/d/1U1z2XL5Im-Pq-B6ctwDZCRpp6KogbZCF/preview" allow="autoplay; fullscreen" allowfullscreen></iframe><div id="local" class="layer hidden"><video id="lv" controls playsinline></video><div class="filebox" id="filebox"><div><b>MP4 파일을 선택하세요</b><p>파일은 서버로 업로드되지 않습니다.</p><label class="btn primary" for="file">MP4 영상 선택</label><input id="file" type="file" accept="video/*" hidden></div></div></div></div><div class="bar"><div class="sub" id="now">큐를 선택하세요</div><button class="btn primary" id="play">선택 지점 재생</button></div></div><div class="card detail"><div class="head"><div><div class="cid" id="cid"></div><h3 id="title"></h3><div class="sub" id="meta"></div></div><span class="badge" id="badge"></span></div><label>담당 구분<select id="type"><option>음원 재생</option><option>그라티아 라이브</option><option>라이브 연주</option><option>효과음</option><option>미정</option></select></label><label>회의 메모<textarea id="memo"></textarea></label><label class="check"><input type="checkbox" id="done"> 협의 완료</label><button class="btn" id="export">회의 데이터 JSON 내보내기</button><div class="note" id="info">큐 자동 재생이 막히면 Drive 호환 재생 또는 내 MP4 선택을 사용하세요.</div></div></section></main></div><script>const KEY='snowwhite-drive-cue-v2';let base=[],cues=[],sel=null,filter='전체',mode='direct',directReady=false,localReady=false;const $=s=>document.querySelector(s),dv=$('#dv'),lv=$('#lv');function save(){let o={};cues.forEach(c=>o[c.id]={type:c.type,memo:c.memo||'',done:!!c.done});localStorage.setItem(KEY,JSON.stringify(o))}function seek(v,s){if(s==null)return;try{v.currentTime=s;v.play().catch(()=>{})}catch(e){}}function filters(){let a=['전체','음원 재생','그라티아 라이브','라이브 연주','효과음','미정'];$('#filters').innerHTML=a.map(x=>`<button class="filter ${x===filter?'on':''}" data-f="${x}">${x}</button>`).join('');document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;filters();list()})}function list(){let q=$('#q').value.toLowerCase(),arr=cues.filter(c=>(filter==='전체'||c.type===filter)&&(`${c.display_no} ${c.title} ${c.act}`).toLowerCase().includes(q)),acts=[...new Set(arr.map(c=>c.act))];$('#list').innerHTML=acts.map(a=>`<div class="act">${a}</div>${arr.filter(c=>c.act===a).map(c=>`<button class="cue ${sel&&sel.id===c.id?'sel':''}" data-id="${c.id}"><span class="num">${c.display_no}</span><span><b>${c.title}</b><small>${c.type}${c.done?' · 완료':''}</small></span><span class="time">${c.time||'미입력'}</span></button>`).join('')}`).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>select(b.dataset.id,true))}function select(id,go=false){sel=cues.find(c=>c.id===id);list();$('#cid').textContent=`CUE ${sel.id} · ${sel.time||'시간 미입력'}`;$('#title').textContent=sel.title;$('#meta').textContent=sel.act+(sel.note?' · '+sel.note:'');$('#badge').textContent=sel.type;$('#type').value=sel.type;$('#memo').value=sel.memo||'';$('#done').checked=!!sel.done;$('#now').textContent=`CUE ${sel.id} · ${sel.time||'미입력'} · ${sel.title}`;if(go){if(mode==='direct'&&directReady)seek(dv,sel.seconds);if(mode==='local'&&localReady)seek(lv,sel.seconds)}}function setMode(m){mode=m;['direct','drive','local'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==m));document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('#info').textContent=m==='drive'?'Drive 호환 플레이어는 사이트에서 시간 이동 제어가 불가능합니다.':m==='local'?'내 MP4에서는 큐 시간 이동이 확실하게 작동합니다.':'왼쪽 큐를 누르면 해당 시간으로 이동하고 재생됩니다.'}dv.onloadedmetadata=()=>{directReady=true;$('#status').textContent='Drive 영상 연결 완료 · 큐 이동 가능'};dv.onerror=()=>{$('#status').textContent='직접 스트림 차단됨 · Drive 호환 재생 사용'};$('#file').onchange=e=>{let f=e.target.files[0];if(!f)return;lv.src=URL.createObjectURL(f);lv.onloadedmetadata=()=>{localReady=true;$('#filebox').classList.add('hidden')}};document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));$('#play').onclick=()=>{if(!sel)return;if(mode==='direct'&&directReady)seek(dv,sel.seconds);if(mode==='local'&&localReady)seek(lv,sel.seconds)};$('#q').oninput=list;$('#type').onchange=e=>{sel.type=e.target.value;save();select(sel.id);filters()};$('#memo').oninput=e=>{sel.memo=e.target.value;save()};$('#done').onchange=e=>{sel.done=e.target.checked;save();list()};$('#export').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(cues,null,2)],{type:'application/json'}));a.download='snowwhite-cue-data.json';a.click()};fetch('./data.json?v=2').then(r=>r.json()).then(d=>{base=d;let saved=JSON.parse(localStorage.getItem(KEY)||'{}');cues=base.map(c=>({...c,...(saved[c.id]||{})}));$('#total').textContent=cues.length;$('#gc').textContent=cues.filter(c=>c.type==='그라티아 라이브').length;filters();select(cues[0].id);setMode('direct')}).catch(e=>{$('#list').innerHTML='<div class="sub" style="padding:20px">데이터를 불러오지 못했습니다.</div>'});</script></body></html>
